<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>GitCoral — 3D GitHub Repository Visualizer</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0c0e12" />
    <meta name="application-name" content="GitCoral" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />

    <!-- SEO -->
    <meta
      name="description"
      content="Explore any public GitHub repository as an interactive 3D visualization. Browse files, filter by type or size, and share your view with a link."
    />
    <link rel="canonical" href="https://gitcoral.com/" />

    <!-- Open Graph -->
    <meta property="og:site_name" content="GitCoral" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://gitcoral.com/" />
    <meta property="og:title" content="GitCoral — 3D GitHub Repository Visualizer" />
    <meta
      property="og:description"
      content="Explore any public GitHub repository as an interactive 3D visualization. Browse files, filter by type or size, and share your view with a link."
    />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@GitCoral" />
    <meta name="twitter:title" content="GitCoral — 3D GitHub Repository Visualizer" />
    <meta
      name="twitter:description"
      content="Explore any public GitHub repository as an interactive 3D visualization. Browse files, filter by type or size, and share your view with a link."
    />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
