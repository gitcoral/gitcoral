<div class="viewer-shell">
  <div class="canvas-area">
    <app-three-canvas
      class="canvas"
      [result]="result()"
      [resetCamera]="resetCamera"
      [display]="display"
      [autoOrbit]="autoOrbit"
      (extColorsChange)="extColors = $event"
      (autoOrbitChange)="autoOrbit = $event"
    />
  </div>

  <aside class="sidebar">
    <app-controls-panel
      [status]="status()"
      [initialRepo]="initialRepo"
      [initialQuery]="initialQuery"
      [initialColorMode]="initialColorMode"
      [initialShow]="initialShow"
      [initialVs]="initialVs"
      [isDiff]="isDiff"
      [diffStats]="diffStats"
      [repoName]="repoName"
      [maxFileSize]="maxFileSize"
      [maxDepth]="maxDepth"
      [extColors]="extColors"
      [autoOrbit]="autoOrbit"
      (repoSubmit)="onRepoSubmit($event)"
      (autoOrbitToggle)="onAutoOrbitToggle()"
      (paramsChange)="onParamsChange($event)"
      (displayChange)="onDisplayChange($event)"
      (snapshotRequest)="onSnapshot()"
      (cameraResetRequest)="onCameraReset()"
      (homeRequest)="onHome()"
      (branchesChange)="onBranchesChange($event)"
    />
  </aside>

  @if (error()) {
    <div class="error-toast">{{ error() }}</div>
  }
</div>
