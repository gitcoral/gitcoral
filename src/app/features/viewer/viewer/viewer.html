<div class="viewer-shell">

  <div class="canvas-area">
    <app-three-canvas class="canvas" [result]="result()" [resetCamera]="resetCamera" [display]="display" [cameraParam]="cameraParam" (extColorsChange)="extColors = $event" (cameraChange)="onCameraChange($event)" />
  </div>

  <aside class="sidebar">
    <app-controls-panel
      [status]="status()"
      [initialRepo]="initialRepo"
      [repoName]="repoName"
      [maxFileSize]="maxFileSize"
      [maxDepth]="maxDepth"
      [extColors]="extColors"
      (repoSubmit)="onRepoSubmit($event)"
      (paramsChange)="onParamsChange($event)"
      (displayChange)="display = $event"
      (snapshotRequest)="onSnapshot()"
      (cameraResetRequest)="onCameraReset()"
      (homeRequest)="onHome()"
    />
  </aside>

  @if (error()) {
    <div class="error-toast">{{ error() }}</div>
  }

</div>
