<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="orb" cx="40%" cy="35%" r="60%">
      <stop offset="0%"   stop-color="#2a4a7a"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <clipPath id="clip">
      <circle cx="16" cy="16" r="15"/>
    </clipPath>
  </defs>

  <!-- Orb body -->
  <circle cx="16" cy="16" r="15" fill="url(#orb)" stroke="#5a8fd0" stroke-width="1.5"/>

  <g clip-path="url(#clip)">
    <!-- Edges (drawn first so nodes sit on top) -->
    <line x1="16" y1="16" x2="9"  y2="9"  stroke="#4a90d9" stroke-width="0.9" opacity="0.6"/>
    <line x1="16" y1="16" x2="24" y2="10" stroke="#4a90d9" stroke-width="0.9" opacity="0.6"/>
    <line x1="16" y1="16" x2="7"  y2="22" stroke="#4a90d9" stroke-width="0.7" opacity="0.45"/>
    <line x1="16" y1="16" x2="25" y2="21" stroke="#4a90d9" stroke-width="0.7" opacity="0.45"/>
    <line x1="16" y1="16" x2="16" y2="6"  stroke="#4a90d9" stroke-width="0.6" opacity="0.35"/>

    <!-- Folder nodes — fully opaque -->
    <circle cx="16" cy="16" r="2.8" fill="#4a90d9"/>
    <circle cx="9"  cy="9"  r="1.8" fill="#3a7fc4"/>
    <circle cx="24" cy="10" r="1.8" fill="#3a7fc4"/>

    <!-- File nodes — fully opaque -->
    <circle cx="7"  cy="22" r="1.2" fill="#bde0ff"/>
    <circle cx="25" cy="21" r="1.0" fill="#bde0ff"/>
    <circle cx="16" cy="6"  r="1.0" fill="#bde0ff"/>
  </g>
</svg>
