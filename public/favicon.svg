<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="stem" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#d94830"/>
      <stop offset="100%" stop-color="#ff7555"/>
    </linearGradient>
    <linearGradient id="arms" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ff7555"/>
      <stop offset="100%" stop-color="#ffa882"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bg)" stroke="#2a1a14" stroke-width="0.5"/>

  <!-- Lines drawn first so nodes sit cleanly on top -->

  <!-- Trunk: root → fork -->
  <line x1="16" y1="26" x2="16" y2="18" stroke="url(#stem)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left arm: fork → left node -->
  <line x1="16" y1="18" x2="9"  y2="11" stroke="url(#arms)" stroke-width="2.0" stroke-linecap="round"/>
  <!-- Right arm: fork → right node -->
  <line x1="16" y1="18" x2="23" y2="11" stroke="url(#arms)" stroke-width="2.0" stroke-linecap="round"/>

  <!-- Left sub-branches -->
  <line x1="9"  y1="11" x2="6"  y2="6.5" stroke="#ffa882" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="9"  y1="11" x2="12" y2="6.5" stroke="#ffa882" stroke-width="1.4" stroke-linecap="round"/>
  <!-- Right sub-branches -->
  <line x1="23" y1="11" x2="20" y2="6.5" stroke="#ffa882" stroke-width="1.4" stroke-linecap="round"/>
  <line x1="23" y1="11" x2="26" y2="6.5" stroke="#ffa882" stroke-width="1.4" stroke-linecap="round"/>

  <!-- Nodes drawn on top of lines -->

  <!-- Tip nodes -->
  <circle cx="6"  cy="6.5" r="2.0" fill="#ffc4a8" stroke="#ff9a76" stroke-width="0.6"/>
  <circle cx="12" cy="6.5" r="2.0" fill="#ffc4a8" stroke="#ff9a76" stroke-width="0.6"/>
  <circle cx="20" cy="6.5" r="2.0" fill="#ffc4a8" stroke="#ff9a76" stroke-width="0.6"/>
  <circle cx="26" cy="6.5" r="2.0" fill="#ffc4a8" stroke="#ff9a76" stroke-width="0.6"/>

  <!-- Branch nodes -->
  <circle cx="9"  cy="11" r="2.2" fill="#ff8060" stroke="#ffa882" stroke-width="0.6"/>
  <circle cx="23" cy="11" r="2.2" fill="#ff8060" stroke="#ffa882" stroke-width="0.6"/>

  <!-- Fork node (middle) -->
  <circle cx="16" cy="18" r="2.5" fill="#ff6644" stroke="#ff9070" stroke-width="0.7"/>

  <!-- Root node (bottom) -->
  <circle cx="16" cy="26" r="2.5" fill="#d94830" stroke="#ff6644" stroke-width="0.7"/>
</svg>
